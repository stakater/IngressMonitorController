{{- if .Values.certManager.enabled -}}
{{- if not (.Capabilities.APIVersions.Has "cert-manager.io/v1") -}}
{{- fail "certManager.enabled=true requires cert-manager CRDs to be installed in the cluster" -}}
{{- end -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "ingress-monitor-controller.fullname" . }}-metrics-cert
  namespace: {{ include "ingress-monitor-controller.namespace" . }}
  labels:
    {{- include "ingress-monitor-controller.labels" . | nindent 4 }}
spec:
  secretName: {{ include "ingress-monitor-controller.fullname" . }}-metrics-tls
  {{- with .Values.certManager.duration }}
  duration: {{ . }}
  {{- end }}
  {{- with .Values.certManager.renewBefore }}
  renewBefore: {{ . }}
  {{- end }}
  dnsNames:
  - {{ include "ingress-monitor-controller.fullname" . }}-metrics-service.{{ include "ingress-monitor-controller.namespace" . }}.svc
  - {{ include "ingress-monitor-controller.fullname" . }}-metrics-service.{{ include "ingress-monitor-controller.namespace" . }}.svc.cluster.local
  issuerRef:
    {{- if .Values.certManager.selfSigned }}
    name: {{ include "ingress-monitor-controller.fullname" . }}-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
    {{- else }}
    name: {{ required "certManager.issuerRef.name is required when certManager.selfSigned is false" .Values.certManager.issuerRef.name }}
    {{- with .Values.certManager.issuerRef.kind }}
    kind: {{ . }}
    {{- end }}
    {{- with .Values.certManager.issuerRef.group }}
    group: {{ . }}
    {{- end }}
    {{- end }}
{{- end }}
