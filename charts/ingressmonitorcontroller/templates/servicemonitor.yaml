{{- if .Values.serviceMonitor.enabled -}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.name | default .Release.Name }}
  namespace: {{ include "ingress-monitor-controller.namespace" . }}
  labels:
    app: '{{ .Chart.Name }}'
    app.kubernetes.io/name: '{{ .Chart.Name }}'
    app.kubernetes.io/instance: '{{ .Values.name | default .Release.Name }}'
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: '{{ .Chart.Name }}'
      app.kubernetes.io/instance: '{{ .Values.name | default .Release.Name }}'
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        insecureSkipVerify: {{ not .Values.certManager.enabled }}
        {{- if and .Values.certManager.enabled .Values.certManager.injectCA }}
        ca:
          secret:
            name: {{ include "ingress-monitor-controller.fullname" . }}-metrics-tls
            key: ca.crt
        {{- end }}
  namespaceSelector:
    matchNames:
    - '{{ include "ingress-monitor-controller.namespace" . }}'
{{- end }}
